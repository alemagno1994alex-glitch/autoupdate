<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeroZone - VOD</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <script src="https://unpkg.com/js-spatial-navigation"></script>
  <style>
    :root { --bg: #0a0e27; --accent: #00ffc8; --muted: rgba(255,255,255,0.8) }
    * { box-sizing: border-box; margin: 0; padding: 0 }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #000; overflow-y: auto; scroll-behavior: smooth;
      min-height: 100vh; position: relative; color: #fff;
    }
    body::before {
      content: ''; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.75);
      z-index: 0; pointer-events: none;
    }
    .category-buttons { display: flex; gap: 1rem; }
    .category-btn {
      padding: 12px 24px; border-radius: 50px;
      border: 2px solid rgba(0,255,200,0.4); background: rgba(255,255,255,0.05);
      color: white; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(10px);
    }
    .category-btn:hover, .category-btn:focus-visible {
      border-color: #00ffc8; background: rgba(255,255,255,0.15);
      box-shadow: 0 0 20px rgba(0,255,200,0.4); outline: none;
    }
    .grid-overlay {
      position: fixed; width: 100%; height: 100%;
      background-image: linear-gradient(rgba(0,255,200,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,200,0.05) 1px, transparent 1px);
      background-size: 50px 50px; z-index: 1; pointer-events: none;
    }
    @keyframes logoGlow {
      0%  { filter: brightness(1) drop-shadow(0 0 5px rgba(0,255,200,0.5)) }
      100%{ filter: brightness(1.2) drop-shadow(0 0 20px rgba(0,255,200,0.8)) }
    }
    @keyframes pulse {
      0%,100%{ transform: scale(1); opacity: 1 }
      50%    { transform: scale(1.1); opacity: .8 }
    }
    .header {
      display: flex; justify-content: space-between;
      align-items: center; padding: 14px 20px; z-index: 10;
    }
    .header::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #00ffc8, #00a8ff, #ff0099);
    }
    .app {
      padding: 20px; display: flex; flex-direction: column; gap: 40px;
      position: relative; z-index: 2;
    }
    .group { display: flex; flex-direction: column; gap: 12px; }
    .group-title {
      font-weight: 700; text-transform: uppercase; margin-left: 6px; color: #fff;
      letter-spacing: 1px; font-size: 0.9rem; display: flex; align-items: center; gap: 1rem;
      text-shadow: 0 0 10px rgba(0,255,200,0.5); padding: 10px;
    }
    .row {
      display: flex; gap: 12px; overflow-x: auto; padding: 6px 6px 14px 6px;
      scroll-behavior: smooth; scrollbar-width: none; scrollbar-color: transparent transparent;
    }
    .row::-webkit-scrollbar { display: none; }

      gap: 20px; padding: 20px 6px;
    }
    @media (max-width: 768px) {
      .results-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
    }
    .card {
      flex: 0 0 140px; height: 210px; position: relative; overflow: hidden;
      cursor: pointer; background: #1a1a1a center/cover no-repeat;
      display: flex; flex-direction: column; outline: none;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      transform: scaleX(0); transition: transform 0.4s ease; z-index: 5;
    }
    .card:focus { border: 5px solid rgba(255,255,255,1.4); z-index: 15; }
    .card:focus::before { transform: scaleX(1); }
    .card .title-overlay {
      position: absolute; top: 0; left: 0; right: 0;

    .card .title {

    }

    .player-header { margin-top: 30px; margin-bottom: 2rem; }
    .back-btn {
      padding: 12px 24px; font-size: 1rem; font-weight: 700; cursor: pointer;
      border-radius: 50px; border: 2px solid rgba(0,255,200,0.4);

    .back-btn:hover, .back-btn:focus-visible {

    .overview { line-height: 1.8; opacity: .9; max-width: 900px; }
    .player-content {

    .season-selector { margin-bottom: 1.5rem }

    .season-selector select {

    .episode-item {

    .episode-item:focus-visible {

    .header-controls { display: flex; align-items: center; gap: 1rem; flex: 1; justify-content: flex-end; }

    @media (max-width: 768px) { .card { flex: 0 0 120px; height: 180px; } }
    @media (max-width: 768px) and (orientation: portrait) {

      .header-controls { justify-content: center; width: 100%; }

    #play-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;

      background: rgba(0,0,0,0.5); pointer-events: none;

    #play-overlay-btn {
      width: 90px; height: 90px; border-radius: 50%;
      background: rgba(0,255,200,0.15); border: 3px solid #00ffc8;
      box-shadow: 0 0 30px rgba(0,255,200,0.5);
      display: flex; align-items: center; justify-content: center; pointer-events: none;
    }
    #play-overlay-btn::after {

    #spinner-ring {

    }
    .api-status-badge.ok .dot { background: #4ade80; animation: none; }
    .api-status-badge.error .dot { background: #ef4444; animation: none; }
  </style>
</head>

<script>
/* ==============================================================
   CONFIGURAZIONE
============================================================== */
const TMDB_API_KEY  = "8265bd1679663a7ea12ac168da84d2e8";
const NETLIFY_PROXY = "/.netlify/functions/proxy?url=";
const VIXSRC_URL    = "vixsrc.to";

const LIST_PROXIES = [
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
  u => `${NETLIFY_PROXY}${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
];

const TMDB_ENDPOINTS = {
  trending:      "trending/all/week",
  nowPlaying:    "movie/now_playing",
  popularMovies: "movie/popular",
  onTheAir:      "tv/on_the_air",
  popularTV:     "tv/popular"
};

/* ==============================================================
   STATO GLOBALE
============================================================== */
let availableContent    = [];
let currentItem         = null;
let currentSeasons      = [];
let currentStreamUrl    = null;
let lastFocusedCard     = null;
let lastFocusedIndex    = -1;
let savedScrollPosition = { x: 0, y: 0 };
let currentSearchQuery  = "";
let isLoadingMore       = false;
let currentPage         = 1;
let totalPages          = 1;
let currentSearchType   = null;
let currentSearchData   = {};

const WATCH_HISTORY_KEY = 'nerozone_watch_history';
const MAX_HISTORY_ITEMS = 20;
const MIN_WATCH_TIME    = 10;
const MIN_WATCH_PERCENT = 1;
const FAVORITES_KEY     = 'nerozone_favorites';
const MAX_FAVORITES     = 50;

const GENRE_MAP = {
  'azione':28,'avventura':12,'animazione':16,'commedia':35,'crimine':80,
  'documentario':99,'dramma':18,'drammatico':18,'famiglia':10751,'fantasy':14,
  'storia':36,'storico':36,'horror':27,'musica':10402,'musicale':10402,
  'mistero':9648,'romantico':10749,'romance':10749,'fantascienza':878,
  'sci-fi':878,'scifi':878,'thriller':53,'guerra':10752,'western':37,
  'azione e avventura':10759,'kids':10762,'bambini':10762,'news':10763,
  'notizie':10763,'reality':10764,'sci-fi & fantasy':10765,'soap':10766,
  'talk':10767,'talk show':10767,'war & politics':10768,'politica':10768
};

/* ==============================================================
   FETCH DISPONIBILITÀ
============================================================== */
async function fetchAvailableContent() {
  const badge    = document.getElementById('api-badge');
  const badgeTxt = document.getElementById('api-badge-text');

  const MOVIE_LIST = `https://${VIXSRC_URL}/api/list/movie/?lang=it`;
  const TV_LIST    = `https://${VIXSRC_URL}/api/list/tv/?lang=it`;

  async function tryFetch(url) {
    for (const makeProxy of LIST_PROXIES) {
      try {
        const res = await fetch(makeProxy(url), { signal: AbortSignal.timeout(8000) });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const data = JSON.parse(text);
        if (Array.isArray(data) && data.length > 0) return data;
        throw new Error('Array vuoto o formato non valido');
      } catch (e) {
        console.warn(`[NeroZone] proxy fallito:`, e.message);
      }
    }
    return null;
  }

  const [moviesRaw, tvRaw] = await Promise.all([tryFetch(MOVIE_LIST), tryFetch(TV_LIST)]);

  let movies = moviesRaw ? moviesRaw.map(i => ({ tmdb_id: i.tmdb_id ?? i.id })) : [];
  let tvShows = tvRaw   ? tvRaw.map(i => ({ tmdb_id: i.tmdb_id ?? i.id }))    : [];

  if (movies.length)  console.log(`[NeroZone] ${movies.length} film disponibili`);
  if (tvShows.length) console.log(`[NeroZone] ${tvShows.length} serie TV disponibili`);

  availableContent = [...movies, ...tvShows];

  if (availableContent.length > 0) {
    badge.className      = 'api-status-badge ok';
    badgeTxt.textContent = `✓ ${availableContent.length} titoli disponibili`;
    setTimeout(() => badge.style.display = 'none', 3000);
  } else {
    badge.className      = 'api-status-badge error';
    badgeTxt.textContent = '⚠ Lista non disponibile – mostro tutti i titoli';
    console.warn('[NeroZone] availableContent vuoto: filtro disabilitato');
  }
}

function isAvailable(tmdbId) {
  if (availableContent.length === 0) return true;
  return availableContent.some(c => c.tmdb_id === tmdbId);
}

/* ==============================================================
   STREAM URL
============================================================== */
async function getDirectStream(tmdbId, isMovie, season = null, episode = null) {
  let vixsrcUrl = `https://${VIXSRC_URL}/${isMovie ? 'movie' : 'tv'}/${tmdbId}`;
  if (!isMovie && season !== null && episode !== null) {
    vixsrcUrl += `/${season}/${episode}`;
  }

  for (const makeProxy of LIST_PROXIES) {
    try {
      const response = await fetch(makeProxy(vixsrcUrl), { signal: AbortSignal.timeout(10000) });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const html = await response.text();

      const paramsMatch = html.match(/window\.masterPlaylist[^:]+params:[^{]+({[^<]+?})/);
      if (!paramsMatch) throw new Error('params non trovati');

      let paramsStr = paramsMatch[1]
        .replace(/'/g, '"').replace(/\s+/g, '')
        .replace(/\n/g, '').replace(/\\n/g, '').replace(',}', '}');
      const params = JSON.parse(paramsStr);

      const urlMatch = html.match(/window\.masterPlaylist\s*=\s*\{[\s\S]*?url:\s*'([^']+)'/);
      if (!urlMatch) throw new Error('URL playlist non trovato');

      const playlistUrl = urlMatch[1];
      const fhdMatch    = html.match(/window\.canPlayFHD\s+?=\s+?(\w+)/);
      const canPlayFHD  = fhdMatch && fhdMatch[1] === 'true';
      const sep         = /\?[^#]+/.test(playlistUrl) ? '&' : '?';
      const m3u8Url     = playlistUrl + sep +
                          'expires=' + params.expires +
                          '&token='  + params.token   +
                          (canPlayFHD ? '&h=1' : '');

      console.log('[Stream] OK:', m3u8Url.substring(0, 80));
      return { m3u8Url };
    } catch (err) {
      console.warn(`[Stream] proxy fallito:`, err.message);
    }
  }

  console.error('[Stream] tutti i proxy hanno fallito');
  return null;
}

   CORS PROXY (per segmenti HLS – usato solo da ProxyLoader)
============================================================== */
function applyCorsProxy(url) {
  if (!url) return url;
  if (url.startsWith('data:') || url.startsWith('blob:')) return url;
  if (!url.startsWith('http')) {
    url = 'https://vixsrc.to' + (url.startsWith('/') ? '' : '/') + url;
  }
  return `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`;
}

function createCard(item, index) {
  const mediaType = item.media_type || (item.title ? "movie" : "tv");
  if (!isAvailable(item.id)) return null;

  const card = document.createElement("div");
  card.className = "card";
  card.setAttribute("tabindex", "0");
  card.setAttribute("data-index", index);

  const title       = item.title || item.name;
  const poster      = item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : "https://via.placeholder.com/500x750?text=No+Image";
  const rating      = item.vote_average ? item.vote_average.toFixed(1) : 'N/A';
  const ratingClass = item.vote_average >= 7 ? 'high' : item.vote_average >= 5 ? 'medium' : 'low';
  const mediaIcon   = mediaType === "movie" ? "🎬" : "📺";

  card.innerHTML = `
    <div class="title-overlay"><div class="title">${title}</div></div>
    <img src="${poster}" alt="${title}" class="poster">
    <div class="rating-badge ${ratingClass}">${mediaIcon} ⭐ ${rating}</div>
  `;

  const handleOpen = () => openPlayer(item);
  card.addEventListener("click", handleOpen);
  card.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleOpen(); } });
  card.addEventListener("focus", () => {
    lastFocusedCard  = card;
    lastFocusedIndex = index;
    saveCurrentPosition();
    setBackgroundFromCard(item);
    scrollCardIntoView(card);
  });
  return card;
}

function scrollCardIntoView(card) {
  const rect       = card.getBoundingClientRect();
  const visibleTop = window.scrollY;
  const visibleBot = visibleTop + window.innerHeight;
  const cardTop    = rect.top    + window.scrollY - 100;
  const cardBot    = rect.bottom + window.scrollY + 100;
  if (cardTop < visibleTop) window.scrollTo({ top: cardTop, behavior: "smooth" });
  else if (cardBot > visibleBot) window.scrollTo({ top: cardBot - window.innerHeight, behavior: "smooth" });
}

async function openPlayer(item) {
  currentItem = item;

  const poster    = item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : "";

  const details = await fetchDetailedInfo(item.id, isMovie);
  let runtime = "";
  if (details) {
    if (isMovie && details.runtime) {
      runtime = `${Math.floor(details.runtime/60)}h ${details.runtime%60}m`;
    } else if (!isMovie && details.episode_run_time?.length) {

  document.getElementById("player-title").textContent = title;
  document.getElementById("player-meta").innerHTML = `

  currentSeasons = seasons.filter(s => s.season_number > 0);
  const selector = document.getElementById("season-select");
  selector.innerHTML = "";
  currentSeasons.forEach(season => {

    opt.value       = season.season_number;

  });

async function loadEpisodes(tvId, seasonNum) {
  const episodes  = await fetchEpisodes(tvId, seasonNum);
  const container = document.getElementById("episodes-list");
  container.innerHTML = "";
  episodes.forEach(ep => {

      <div class="episode-number">Episodio ${ep.episode_number}</div>

      document.querySelectorAll(".episode-item").forEach(e => e.classList.remove("active"));
      div.classList.add("active");
      document.getElementById("episode-warning").style.display = "none";
      showHint(`Caricamento Episodio ${ep.episode_number}...`, 2000);

 if (Hls.isSupported()) {
  // Scarica il manifest, riscrive tutti gli URI, poi lo passa come blob
  async function fetchAndPatchManifest(url) {
    const proxied = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`;
    const res = await fetch(proxied);
    let text = await res.text();

    // Riscrive URI delle chiavi AES → corsproxy.io (supporta tutto senza redirect)
    text = text.replace(
      /URI="(https?:\/\/[^"]+)"/g,
      (_, uri) => `URI="https://corsproxy.io/?${encodeURIComponent(uri)}"`
    );

    // Riscrive URL delle audio track → codetabs
    text = text.replace(
      /^(https?:\/\/vixsrc\.to\/.+)$/gm,
      line => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(line)}`
    );

    const blob = new Blob([text], { type: 'application/vnd.apple.mpegurl' });
    return URL.createObjectURL(blob);
  }

  class ProxyLoader extends Hls.DefaultConfig.loader {
    load(ctx, cfg, cbs) {
      const raw = ctx.url;
      if (!raw.includes('codetabs.com') && !raw.includes('corsproxy') &&
          !raw.includes('thingproxy') && !raw.includes('netlify') && !raw.startsWith('blob:')) {
        ctx.url = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(raw)}`;
      }
      super.load(ctx, cfg, cbs);
    }
  }

  let blobUrl = null;
  fetchAndPatchManifest(streamUrl).then(patched => {
    blobUrl = patched;
    const hls = new Hls({ loader: ProxyLoader, maxBufferLength: 60, startLevel: -1 });
    window._hlsInstance = hls;
    hls.loadSource(patched);
    hls.attachMedia(videoEl);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      if (startTime > 0) videoEl.currentTime = startTime;
      videoEl.play().catch(() => {});
      hidePlayOverlay();
    });
    hls.on(Hls.Events.ERROR, (_, data) => {
      if (!data.fatal) return;
      if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
      else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
      else showError("Errore HLS", "Impossibile riprodurre");
    });
  }).catch(() => showError("Errore", "Impossibile caricare il manifest"));
} else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
    videoEl.src = streamUrl;
    videoEl.addEventListener('loadedmetadata', () => {
      if (startTime > 0) videoEl.currentTime = startTime;
      videoEl.play().catch(() => {});
    }, { once: true });
  } else {
    showError("Errore", "HLS non supportato");
  }

  controls.showFn();

/* ==============================================================
   BARRA CONTROLLI

function buildControlsBar(videoEl, isMovie, currentSeason, currentEpisode) {
  const el = document.createElement('div');
  el.id = 'player-controls';
  el.style.cssText = `
    position:fixed;bottom:0;left:0;right:0;z-index:10002;
    padding:0 20px 16px;
    background:linear-gradient(to top,rgba(0,0,0,0.95) 0%,transparent 100%);
    transition:opacity 0.4s;opacity:1;`;

  const titleText    = currentItem?.title || currentItem?.name || '';
  const subtitleText = (!isMovie && currentSeason && currentEpisode) ? `S${currentSeason}:E${currentEpisode}` : '';

  el.innerHTML = `
    <div style="color:#fff;font-size:1.1rem;font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;">
      <span>${titleText}${subtitleText ? ` <span style="color:#00ffc8">• ${subtitleText}</span>` : ''}</span>
      <span id="ctrl-time" style="color:rgba(255,255,255,0.7);font-size:0.95rem;">0:00 / 0:00</span>
    </div>
    <div id="progress-wrap" style="width:100%;height:6px;background:rgba(255,255,255,0.25);border-radius:6px;cursor:pointer;margin-bottom:14px;position:relative;">
      <div id="progress-fill" style="height:100%;background:#00ffc8;border-radius:6px;width:0%;box-shadow:0 0 10px rgba(0,255,200,0.8);"></div>
    </div>
    <div style="display:flex;gap:12px;align-items:center;">
      <button id="ctrl-play" style="${btnCss()}">▶️ <span style="font-size:.85rem">Play</span></button>
      <button id="ctrl-rew"  style="${btnCss()}">⏪ <span style="font-size:.85rem">-10s</span></button>
      <button id="ctrl-fwd"  style="${btnCss()}">⏩ <span style="font-size:.85rem">+10s</span></button>
      <button id="ctrl-vol"  style="${btnCss()}">🔊 <span style="font-size:.85rem">Audio</span></button>
    </div>`;

  el.querySelector('#progress-wrap').addEventListener('click', e => {
    const rect = el.querySelector('#progress-wrap').getBoundingClientRect();
    const pct  = (e.clientX - rect.left) / rect.width;
    if (videoEl.duration > 0) videoEl.currentTime = pct * videoEl.duration;
  });

  let focusedBtnIdx   = -1;
  let controlsVisible = true;
  let hideTimeout     = null;
  const allBtns       = [];

  const interval = setInterval(() => {
    if (videoEl.duration > 0) {
      const pct  = (videoEl.currentTime / videoEl.duration) * 100;
      const fill = document.getElementById('progress-fill');
      const time = document.getElementById('ctrl-time');
      if (fill) fill.style.width = pct + '%';
      if (time) {
        const fmt = s => `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
        time.textContent = `${fmt(videoEl.currentTime)} / ${fmt(videoEl.duration)}`;
      }
    }
    const pb = document.getElementById('ctrl-play');
    if (pb) pb.innerHTML = videoEl.paused
      ? '▶️ <span style="font-size:.85rem">Play</span>'
      : '⏸️ <span style="font-size:.85rem">Pausa</span>';
  }, 500);

  const showFn = () => {
    el.style.opacity = '1'; controlsVisible = true;
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(() => { el.style.opacity = '0'; controlsVisible = false; }, 4000);
  };

  setTimeout(() => {
    const btnPlay = document.getElementById('ctrl-play');
    const btnRew  = document.getElementById('ctrl-rew');
    const btnFwd  = document.getElementById('ctrl-fwd');
    const btnVol  = document.getElementById('ctrl-vol');
    allBtns.push(btnPlay, btnRew, btnFwd, btnVol);
    if (btnPlay) btnPlay.onclick = () => { videoEl.paused ? videoEl.play() : videoEl.pause(); };
    if (btnRew)  btnRew.onclick  = () => { videoEl.currentTime = Math.max(0, videoEl.currentTime - 10); };
    if (btnFwd)  btnFwd.onclick  = () => { videoEl.currentTime = Math.min(videoEl.duration || 0, videoEl.currentTime + 10); };
    if (btnVol)  btnVol.onclick  = () => {
      videoEl.muted = !videoEl.muted;
      btnVol.querySelector('span').textContent = videoEl.muted ? 'Muto' : 'Audio';
    };
  }, 100);

  videoEl.addEventListener('mousemove', showFn);

  return {
    el, interval, showFn,
    get focusedBtnIdx()  { return focusedBtnIdx; },
    set focusedBtnIdx(v) { focusedBtnIdx = v; },
    get visible()        { return controlsVisible; },
    get allBtns()        { return allBtns; },
    focusBtn(idx) {
      allBtns.forEach(b => {
        if (!b) return;
        b.style.background  = 'rgba(255,255,255,0.1)';
        b.style.borderColor = 'rgba(0,255,200,0.4)';
        b.style.transform   = 'scale(1)';
      });
      if (idx < 0 || idx >= allBtns.length) { focusedBtnIdx = -1; return; }
      focusedBtnIdx = idx;
      const b = allBtns[idx];
      if (!b) return;
      b.style.background  = 'rgba(0,255,200,0.35)';
      b.style.borderColor = '#00ffc8';
      b.style.transform   = 'scale(1.12)';
    }
  };
}

function btnCss() {
  return `background:rgba(255,255,255,0.1);border:2px solid rgba(0,255,200,0.4);
          color:#fff;border-radius:50px;padding:8px 18px;font-size:1rem;
          cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;`;
}

function buildKeyHandler(videoEl, controls, cleanup) {
  return (e) => {
    const k = e.key || '';
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter',' '].includes(k) ||
        [37,38,39,40,13,32].includes(e.keyCode)) {
      e.preventDefault(); e.stopPropagation();
    }
    if (k === 'ArrowUp' || e.keyCode === 38) {
      controls.showFn();
      if (controls.focusedBtnIdx === -1) controls.focusBtn(0);
      return;
    }
    if (k === 'ArrowDown' || e.keyCode === 40) {
      if (controls.focusedBtnIdx >= 0) { controls.focusBtn(-1); controls.showFn(); }
      return;
    }
    if (k === 'ArrowLeft' || e.keyCode === 37) {
      if (controls.visible && controls.focusedBtnIdx > 0) {
        controls.focusBtn(controls.focusedBtnIdx - 1); controls.showFn();
      } else {
        videoEl.currentTime = Math.max(0, videoEl.currentTime - 10);
      }
      return;
    }
    if (k === 'ArrowRight' || e.keyCode === 39) {
      if (controls.visible && controls.focusedBtnIdx >= 0 && controls.focusedBtnIdx < controls.allBtns.length - 1) {
        controls.focusBtn(controls.focusedBtnIdx + 1); controls.showFn();
      } else {
        videoEl.currentTime = Math.min(videoEl.duration || 0, videoEl.currentTime + 10);
      }
      return;
    }
    if (k === 'Enter' || e.keyCode === 13 || k === ' ' || e.keyCode === 32) {
      if (controls.visible && controls.focusedBtnIdx >= 0) {
        controls.allBtns[controls.focusedBtnIdx]?.click();
      } else {
        videoEl.paused ? videoEl.play() : videoEl.pause();
      }
      controls.showFn();
      return;
    }
    if (['BrowserBack','GoBack','Escape','Back'].includes(k) || [10009,461,8].includes(e.keyCode)) {
      if (controls.focusedBtnIdx >= 0) { controls.focusBtn(-1); return; }
      cleanup();
      exitPlayerAndReturnHome();
    }
  };
}

    document.getElementById("player").style.display = "none";
    window.location.href = vlcUrl;
    setTimeout(() => showHint('🎬 Apertura VLC...', 2000), 100);
  };
  document.getElementById('open-browser').onclick = () => { close(); _playHLS(streamUrl, startTime); };
}

/* ==============================================================
   OVERLAY
============================================================== */
function showPlayOverlay(mode) {
  const overlay = document.getElementById('play-overlay');
  const btn     = document.getElementById('play-overlay-btn');
  const spinner = document.getElementById('spinner-ring');
  if (!overlay) return;
  overlay.style.display = 'flex';
  if (mode === 'loading') { btn.innerHTML = ''; spinner.style.display = 'block'; }
  else { btn.innerHTML = '▶'; spinner.style.display = 'none'; }
}

function hidePlayOverlay() {
  const overlay = document.getElementById('play-overlay');
  if (overlay) overlay.style.display = 'none';
}

/* ==============================================================
   PLAYER → HOME
============================================================== */
function exitPlayerAndReturnHome() {
  if (typeof SpatialNavigation !== 'undefined') SpatialNavigation.resume();
  hidePlayOverlay();
  document.getElementById("player").style.display  = "none";
  document.querySelector('.header').style.display  = 'flex';
  document.getElementById("home").style.display    = "block";
  document.getElementById("results").style.display = "none";
  loadContinueWatching();
  document.body.style.backgroundImage = 'none';
  history.pushState(null, null, location.href);
  setTimeout(() => { if (lastFocusedCard) lastFocusedCard.focus(); else restorePosition(); }, 100);
}

function handleBackButton() {
  const playerVisible = document.getElementById("player").style.display === "block";
  if (playerVisible) { exitPlayerAndReturnHome(); return false; }
  return false;
}

/* ==============================================================
   BACKGROUND
============================================================== */
function setBackgroundFromCard(item) {
  const backdrop = item.backdrop_path
    ? `https://image.tmdb.org/t/p/original${item.backdrop_path}`
    : item.poster_path ? `https://image.tmdb.org/t/p/w1280${item.poster_path}` : null;
  if (backdrop) {
    document.body.style.backgroundImage     = `url('${backdrop}')`;
    document.body.style.backgroundSize      = 'cover';
    document.body.style.backgroundPosition  = 'center 20%';
    document.body.style.backgroundRepeat    = 'no-repeat';
    document.body.style.backgroundAttachment = 'fixed';
  } else {
    document.body.style.backgroundImage = 'none';
  }
}

/* ==============================================================
   CRONOLOGIA & PREFERITI
============================================================== */
function getWatchHistory() {
  try { const h = localStorage.getItem(WATCH_HISTORY_KEY); return h ? JSON.parse(h) : []; } catch { return []; }
}

function saveToWatchHistory(item, progress, duration, isMovie, seasonNum = null, episodeNum = null) {
  try {
    const pct = (progress / duration) * 100;
    if (progress < MIN_WATCH_TIME || pct < MIN_WATCH_PERCENT) return;
    if (pct > 90) { removeFromWatchHistory(item.id, isMovie, seasonNum, episodeNum); return; }
    let history = getWatchHistory();
    const entry = { id: item.id, title: item.title || item.name, poster: item.poster_path,
      mediaType: isMovie ? 'movie' : 'tv', progress, duration, timestamp: Date.now(), item };
    if (!isMovie && seasonNum !== null) { entry.season = seasonNum; entry.episode = episodeNum; }
    history = history.filter(h => isMovie ? !(h.id === item.id && h.mediaType === 'movie') : h.id !== item.id);
    history.unshift(entry);
    if (history.length > MAX_HISTORY_ITEMS) history = history.slice(0, MAX_HISTORY_ITEMS);
    localStorage.setItem(WATCH_HISTORY_KEY, JSON.stringify(history));
  } catch { }
}

function getItemProgress(itemId, isMovie, seasonNum = null, episodeNum = null) {
  try {
    const h = getWatchHistory().find(h =>
      isMovie ? h.id === itemId && h.mediaType === 'movie'
              : h.id === itemId && h.mediaType === 'tv' && h.season === seasonNum && h.episode === episodeNum);
    return h ? { progress: h.progress, duration: h.duration } : null;
  } catch { return null; }
}

function removeFromWatchHistory(itemId, isMovie, seasonNum = null, episodeNum = null) {
  try {
    let h = getWatchHistory().filter(h =>
      isMovie ? !(h.id === itemId && h.mediaType === 'movie')
              : !(h.id === itemId && h.mediaType === 'tv' && h.season === seasonNum && h.episode === episodeNum));
    localStorage.setItem(WATCH_HISTORY_KEY, JSON.stringify(h));
    loadContinueWatching();
  } catch { }
}

function getFavorites() {
  try { const f = localStorage.getItem(FAVORITES_KEY); return f ? JSON.parse(f) : []; } catch { return []; }
}

function isFavorite(itemId, isMovie) {
  return getFavorites().some(f => f.id === itemId && f.mediaType === (isMovie ? 'movie' : 'tv'));
}

function addToFavorites(item, isMovie) {
  try {
    if (isFavorite(item.id, isMovie)) return false;
    let favs = getFavorites();
    favs.unshift({ id: item.id, title: item.title || item.name, poster: item.poster_path,
      mediaType: isMovie ? 'movie' : 'tv', timestamp: Date.now(), item });
    if (favs.length > MAX_FAVORITES) favs = favs.slice(0, MAX_FAVORITES);
    localStorage.setItem(FAVORITES_KEY, JSON.stringify(favs));
    return true;
  } catch { return false; }
}

function removeFromFavorites(itemId, isMovie) {
  try {
    let favs = getFavorites().filter(f => !(f.id === itemId && f.mediaType === (isMovie ? 'movie' : 'tv')));
    localStorage.setItem(FAVORITES_KEY, JSON.stringify(favs));
    loadContinueWatching();
    return true;
  } catch { return false; }
}

async function loadContinueWatching() {
  const history   = getWatchHistory();
  const favorites = getFavorites();
  const container = document.getElementById("continueWatching");
  const group     = document.getElementById("continue-watching-group");
  if (!container || !group) return;
  container.innerHTML = "";
  if (history.length === 0 && favorites.length === 0) { group.style.display = "none"; return; }
  group.style.display = "block";
  let idx = 0;
  history.forEach(h => { const w = createContinueCard(h, idx++, false); if (w) container.appendChild(w); });
  favorites.forEach(f => { const w = createContinueCard(f, idx++, true);  if (w) container.appendChild(w); });
}

function createContinueCard(historyItem, index, isFav) {
  const wrapper = document.createElement("div");
  wrapper.className = "continue-card-wrapper";
  wrapper.style.position = "relative";

  const card = document.createElement("div");
  card.className = "card continue-watching-card";
  card.setAttribute("tabindex", "0");
  card.setAttribute("data-index", index);
  card.style.position = "relative";

  const poster = historyItem.poster
    ? `https://image.tmdb.org/t/p/w500${historyItem.poster}`
    : "https://via.placeholder.com/500x750?text=No+Image";
  const title = historyItem.title;
  const sub   = historyItem.mediaType === 'tv' && historyItem.season
    ? (isFav ? '📺 Serie TV' : `S${historyItem.season}:E${historyItem.episode}`) : '';

  let progressHTML = '';
  if (!isFav && historyItem.duration > 0) {
    const pct = Math.min(100, (historyItem.progress / historyItem.duration) * 100);
    const rem = Math.floor((historyItem.duration - historyItem.progress) / 60);
    progressHTML = `
      <div style="position:absolute;bottom:0;left:0;right:0;padding:0 8px 35px 8px;background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
          <span style="font-size:.65rem;">${Math.floor(pct)}%</span>
          <span style="font-size:.65rem;opacity:.7;">-${rem}m</span>
        </div>
        <div style="height:3px;background:rgba(255,255,255,0.3);border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:#00ffc8;box-shadow:0 0 10px rgba(0,255,200,0.8);"></div>
        </div>
      </div>`;
  }

  card.innerHTML = `
    <div class="title-overlay" style="background:linear-gradient(to bottom,rgba(0,0,0,.95),rgba(0,0,0,.7) 70%,transparent);padding:10px 8px;">
      <div class="title" style="font-size:.75rem;">${title}</div>
      ${sub ? `<div style="font-size:.65rem;color:#00ffc8;font-weight:700;">${sub}</div>` : ''}
    </div>
    <img src="${poster}" alt="${title}" class="poster">
    ${isFav ? '<div style="position:absolute;top:8px;left:8px;background:rgba(255,215,0,0.95);padding:6px 10px;border-radius:20px;font-size:1rem;">⭐</div>' : ''}
    ${progressHTML}`;

  const removeBtn = document.createElement('button');
  removeBtn.innerHTML = isFav ? '⭐' : '×';
  removeBtn.style.cssText = `position:absolute;top:8px;right:8px;background:${isFav?'rgba(255,215,0,.95)':'rgba(229,9,20,.95)'};border:2px solid rgba(255,255,255,.8);color:${isFav?'#000':'#fff'};width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1.2rem;font-weight:700;display:flex;align-items:center;justify-content:center;z-index:20;opacity:0;transition:all .3s ease;`;
  removeBtn.onclick = e => {
    e.stopPropagation();
    if (confirm(`Rimuovere "${title}"?`)) {
      if (isFav) removeFromFavorites(historyItem.id, historyItem.mediaType === 'movie');
      else removeFromWatchHistory(historyItem.id, historyItem.mediaType === 'movie', historyItem.season, historyItem.episode);
    }
  };

  wrapper.addEventListener('mouseenter', () => removeBtn.style.opacity = '1');
  wrapper.addEventListener('mouseleave', () => { if (document.activeElement !== removeBtn) removeBtn.style.opacity = '0'; });
  card.onclick = () => {
    if (historyItem.mediaType === 'tv' && !isFav) openPlayerWithEpisode(historyItem.item, historyItem.season, historyItem.episode);
    else openPlayer(historyItem.item);
  };
  card.addEventListener('focus', () => {
    lastFocusedCard = card; lastFocusedIndex = index;
    setBackgroundFromCard(historyItem.item || historyItem);
    removeBtn.style.opacity = '1';
  });
  card.addEventListener('blur', () => { if (document.activeElement !== removeBtn) removeBtn.style.opacity = '0'; });

  wrapper.appendChild(card);
  wrapper.appendChild(removeBtn);
  return wrapper;
}

async function openPlayerWithEpisode(item, seasonNum, episodeNum) {
  currentItem = item;
  history.pushState(null, null, location.href);
  document.getElementById("home").style.display    = "none";
  document.getElementById("results").style.display = "none";
  document.getElementById("player").style.display  = "block";
  document.querySelector('.header').style.display  = 'none';

  document.getElementById("player-title").textContent = item.title || item.name;
  document.getElementById("player-meta").innerHTML =
    `<span>${item.release_date || item.first_air_date || 'N/A'}</span><span>Serie TV - S${seasonNum}E${episodeNum}</span>`;
  document.getElementById("player-overview").textContent = item.overview || '';

  await loadTVSeasons(item.id);
  document.getElementById("season-select").value = seasonNum;
  await loadEpisodes(item.id, seasonNum);

  const streamData = await getDirectStream(item.id, false, seasonNum, episodeNum);
  if (streamData?.m3u8Url) {
    const saved = getItemProgress(item.id, false, seasonNum, episodeNum);
    await playInFullscreen(streamData.m3u8Url, saved?.progress > 0 ? saved.progress : 0);
  } else {
    showError("Errore", "Impossibile caricare l'episodio");
  }
  window.scrollTo(0, 0);
}

/* ==============================================================
   RICERCA
============================================================== */
function openSearch() {
  const result = prompt("🔍 Cerca: titolo, attore, regista o anno", currentSearchQuery);
  if (result !== null) {
    currentSearchQuery = result.trim();
    const searchBtn = document.getElementById("search");
    const clearBtn  = document.getElementById("clearSearchBtn");
    if (currentSearchQuery) {
      searchBtn.textContent  = `🔍 Ricerca: ${currentSearchQuery}`;
      clearBtn.style.display = "inline-block";
      searchEverything(currentSearchQuery);
    } else {
      clearSearch();
    }
  }
}

function clearSearch() {
  currentSearchQuery = "";
  currentPage = 1; totalPages = 1; currentSearchType = null; currentSearchData = {};
  document.getElementById("search").textContent     = "🔍 Cerca Film, Serie TV, Genere...";
  document.getElementById("clearSearchBtn").style.display = "none";
  document.getElementById("results").style.display  = "none";
  document.getElementById("home").style.display     = "block";
  document.body.style.backgroundImage = 'none';
}

async function searchEverything(query, page = 1, append = false) {
  try {
    const resultsContainer = document.getElementById("results");
    if (!append) {
      resultsContainer.innerHTML = '<div class="loading">🔍 Ricerca in corso...</div>';
      document.getElementById("home").style.display = "none";
      resultsContainer.style.display = "block";
      currentPage = 1; totalPages = 1; currentSearchData = { query };
    }

    let allResults = [];
    const queryLower = query.toLowerCase().trim();
    const genreId    = GENRE_MAP[queryLower];
    const year       = parseInt(query);

    if (genreId) {
      currentSearchType = 'genre';
      const [rm, rt] = await Promise.all([
        fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&language=it-IT&with_genres=${genreId}&sort_by=popularity.desc&page=${page}`),
        fetch(`https://api.themoviedb.org/3/discover/tv?api_key=${TMDB_API_KEY}&language=it-IT&with_genres=${genreId}&sort_by=popularity.desc&page=${page}`)
      ]);
      const dm = await rm.json(), dt = await rt.json();
      allResults.push(...dm.results.map(i => ({...i, media_type:'movie'})));
      allResults.push(...dt.results.map(i => ({...i, media_type:'tv'})));
      totalPages = Math.max(dm.total_pages, dt.total_pages);
    } else if (!isNaN(year) && year >= 1900 && year <= 2030) {
      currentSearchType = 'year';
      const [rm, rt] = await Promise.all([
        fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&language=it-IT&primary_release_year=${year}&sort_by=popularity.desc&page=${page}`),
        fetch(`https://api.themoviedb.org/3/discover/tv?api_key=${TMDB_API_KEY}&language=it-IT&first_air_date_year=${year}&sort_by=popularity.desc&page=${page}`)
      ]);
      const dm = await rm.json(), dt = await rt.json();
      allResults.push(...dm.results.map(i => ({...i, media_type:'movie'})));
      allResults.push(...dt.results.map(i => ({...i, media_type:'tv'})));
      totalPages = Math.max(dm.total_pages, dt.total_pages);
    } else {
      currentSearchType = 'title';
      const r = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API_KEY}&language=it-IT&query=${encodeURIComponent(query)}&page=${page}`);
      const d = await r.json();
      allResults.push(...d.results.filter(i => i.media_type !== 'person'));
      totalPages = d.total_pages;
    }

    const unique = Array.from(new Map(allResults.map(i => [i.id, i])).values())
      .filter(i => isAvailable(i.id))
      .sort((a, b) => (b.popularity || 0) - (a.popularity || 0));

    if (!append) resultsContainer.innerHTML = "";
    else { const ld = resultsContainer.querySelector('.loading-more'); if (ld) ld.remove(); }

    let group = resultsContainer.querySelector('.group');
    let row   = resultsContainer.querySelector('.results-grid');
    if (!group) {
      group = document.createElement("div"); group.className = "group";
      group.innerHTML = `<div class="group-title">🔍 Risultati: "${query}"</div>`;
      resultsContainer.appendChild(group);
      row = document.createElement("div"); row.className = "results-grid";
      group.appendChild(row);
    }

    let cardIndex = row.children.length;
    unique.forEach(item => {
      const card = createCard(item, cardIndex++);
      if (card) { row.appendChild(card); card.addEventListener("keydown", handleCardNavigation); }
    });

    if (row.children.length === 0)
      row.innerHTML = '<div class="empty-message">Nessun risultato disponibile</div>';

  } catch (err) {
    console.error("Search error:", err);
  } finally {
    isLoadingMore = false;
  }
}

window.addEventListener('scroll', () => {
  if (document.getElementById("results").style.display !== "block") return;
  if (isLoadingMore || currentPage >= totalPages) return;
  if (window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 500) {
    isLoadingMore = true;
    currentPage++;
    searchEverything(currentSearchData.query, currentPage, true);
  }
});

/* ==============================================================
   NAVIGAZIONE TASTIERA
============================================================== */
function handleCardNavigation(e) {
  if (!["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)) return;
  const card = e.target;
  if (!card.classList.contains("card")) return;
  const row  = card.closest(".row");
  if (!row) return;
  const cards = Array.from(row.querySelectorAll(".card"));
  const idx   = cards.indexOf(card);
  let next    = null;

  switch (e.key) {
    case "ArrowRight": e.preventDefault(); if (idx < cards.length - 1) next = cards[idx + 1]; break;
    case "ArrowLeft":  e.preventDefault(); if (idx > 0) next = cards[idx - 1]; break;
    case "ArrowUp": {
      e.preventDefault();
      const groups = Array.from(document.querySelectorAll('.group')).filter(g => window.getComputedStyle(g).display !== 'none');
      const ci = groups.indexOf(row.closest('.group'));
      if (ci === 0) { document.getElementById('search')?.focus(); return; }
      if (ci > 0)  { next = groups[ci-1].querySelector('.card'); }
      break;
    }
    case "ArrowDown": {
      e.preventDefault();
      let ng = row.closest('.group')?.nextElementSibling;
      while (ng && !ng.classList.contains('group')) ng = ng.nextElementSibling;
      if (ng) next = ng.querySelector('.card');
      break;
    }
  }
  if (next) next.focus();
}

function handleGlobalKeyNavigation(e) {
  const active = document.activeElement;
  if (active?.id === 'search' && e.key === 'ArrowDown') {
    e.preventDefault();
    const firstCard = document.querySelector('#home .group:not([style*="display:none"]) .card, #results .card');
    firstCard?.focus();
  }
}

function globalBackHandler(e) {
  if (!['BrowserBack','GoBack','Escape','Back','Backspace'].includes(e.key) && ![10009,461,8].includes(e.keyCode)) return;
  const playerVisible = document.getElementById("player").style.display === "block";
  if (!document.activeElement || document.activeElement.id !== 'search') {
    e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation();
  }
  if (playerVisible) { exitPlayerAndReturnHome(); return false; }
}

/* ==============================================================
   POSITION SAVE/RESTORE
============================================================== */
function saveCurrentPosition() {
  try {
    if (lastFocusedIndex >= 0) {
      localStorage.setItem('filmissimi_last_card', lastFocusedIndex.toString());
      localStorage.setItem('filmissimi_scroll', JSON.stringify({ x: window.scrollX, y: window.scrollY }));
    }
  } catch { }
}

function loadSavedPosition() {
  try {
    const saved = localStorage.getItem('filmissimi_last_card');
    if (saved) { lastFocusedIndex = parseInt(saved, 10); return true; }
  } catch { }
  return false;
}

function restorePosition() {
  if (lastFocusedIndex >= 0) {
    setTimeout(() => {
      const card = document.querySelector(`[data-index="${lastFocusedIndex}"]`);
      if (card) { card.focus(); lastFocusedCard = card; }
    }, 300);
  }
}

/* ==============================================================
   HINT / ERROR
============================================================== */
function showHint(text, duration = 3000) {
  const hint = document.getElementById('keyboard-hint');
  hint.textContent = text;
  hint.style.display = 'block';
  setTimeout(() => hint.style.display = 'none', duration);
}

function showError(title, message) {
  const d = document.createElement("div");
  d.className = "error-message";
  d.style.cssText = "position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10000;max-width:500px;";
  d.innerHTML = `<strong>${title}</strong><br>${message}`;
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 5000);
}

   LOGO
============================================================== */
function createLogo() {

/* ==============================================================
   INIT
============================================================== */
async function init() {
  createLogo();
  history.pushState(null, null, location.href);
  window.onpopstate = () => { history.pushState(null, null, location.href); handleBackButton(); };
  document.addEventListener("keydown", handleGlobalKeyNavigation);
  document.addEventListener("keydown", globalBackHandler, true);
  document.addEventListener("keyup",   globalBackHandler, true);
  window.addEventListener("keydown",   globalBackHandler, true);
  window.addEventListener("keyup",     globalBackHandler, true);

  await fetchAvailableContent();
  await loadContinueWatching();

  const lists = ["trending", "nowPlaying", "popularMovies", "onTheAir", "popularTV"];
  let cardIndex = 0;
  for (const list of lists) {
    const container = document.getElementById(list);
    const items     = await fetchList(list);
    container.innerHTML = "";
    for (const item of items) {
      const card = createCard(item, cardIndex++);
      if (card) { container.appendChild(card); card.addEventListener("keydown", handleCardNavigation); }
    }
  }

  document.getElementById('search').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openSearch(); }
  });
  document.getElementById('clearSearchBtn').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); clearSearch(); }
  });
  document.querySelector(".back-btn").addEventListener("click", () => exitPlayerAndReturnHome());

  if (typeof SpatialNavigation !== 'undefined') {
    SpatialNavigation.init();
    SpatialNavigation.add({ selector: '.card, .episode-item, button, select, input' });
    SpatialNavigation.makeFocusable();
  }

  if (loadSavedPosition()) restorePosition();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('[SW] Registrato'))
    .catch(e => console.warn('[SW] Errore:', e));
}

window.addEventListener('DOMContentLoaded', init);
