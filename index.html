<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeroZone</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <style>
    :root {
      --accent: #00ffc8;
      --accent2: #00a8ff;
      --bg: #080b1a;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(0,255,200,0.18);
      --text: #f0f4f8;
      --muted: rgba(240,244,248,0.55);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
      background-attachment: fixed;
    }
    body.has-backdrop {
      background-size: cover; background-position: center 20%;
      background-repeat: no-repeat;
    }
    body.has-backdrop::after {
      content: ''; position: fixed; inset: 0;
      background: linear-gradient(to bottom, rgba(8,11,26,0.82) 0%, rgba(8,11,26,0.96) 100%);
      z-index: 0; pointer-events: none;
    }

    /* ── HEADER ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px;
      background: rgba(8,11,26,0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-size: 1.5rem; font-weight: 900; white-space: nowrap;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 60%, #ff0099 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      flex-shrink: 0;
    }
    .logo img { height: 36px; vertical-align: middle; margin-left: 4px; }
    .search-btn {
      flex: 1; max-width: 480px; padding: 8px 18px;
      border-radius: 40px; border: 1px solid var(--border);
      background: var(--surface); color: var(--muted);
      font-size: 0.9rem; cursor: pointer; text-align: left;
      transition: all 0.2s;
    }
    .search-btn:hover { border-color: var(--accent); color: var(--text); background: rgba(255,255,255,0.08); }
    .clear-btn {
      padding: 7px 14px; border-radius: 40px; border: 1px solid rgba(229,9,20,0.5);
      background: rgba(229,9,20,0.15); color: #ff6b6b;
      font-size: 0.85rem; cursor: pointer; display: none; white-space: nowrap;
      transition: all 0.2s;
    }
    .clear-btn:hover { background: rgba(229,9,20,0.3); }

    /* ── STATUS BADGE ── */
    .api-badge {
      position: fixed; bottom: 16px; right: 16px; z-index: 200;
      background: rgba(8,11,26,0.95); border: 1px solid var(--border);
      border-radius: 10px; padding: 6px 12px;
      font-size: 0.75rem; display: flex; align-items: center; gap: 6px;
      transition: opacity 0.5s;
    }
    .api-badge .dot {
      width: 7px; height: 7px; border-radius: 50%; background: #fbbf24;
      animation: blink 1.2s infinite;
    }
    .api-badge.ok .dot { background: #4ade80; animation: none; }
    .api-badge.error .dot { background: #ef4444; animation: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── MAIN ── */
    #app { position: relative; z-index: 1; padding: 0 0 60px; }

    /* ── HOME ── */
    .section { padding: 28px 0 0; }
    .section-title {
      font-size: 0.78rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--accent);
      padding: 0 20px 10px; opacity: 0.85;
    }
    .row {
      display: flex; gap: 10px; overflow-x: auto; padding: 4px 20px 16px;
      scrollbar-width: none;
    }
    .row::-webkit-scrollbar { display: none; }

    /* ── CARD ── */
    .card {
      flex: 0 0 130px; height: 195px; border-radius: 8px;
      overflow: hidden; cursor: pointer; position: relative;
      background: #1a1d2e center/cover no-repeat;
      border: 1.5px solid transparent;
      transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
      outline: none;
    }
    .card:hover, .card:focus {
      transform: scale(1.06); border-color: var(--accent);
      box-shadow: 0 0 18px rgba(0,255,200,0.28); z-index: 5;
    }
    .card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card .c-title {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 6px 7px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.88), transparent);
      font-size: 0.72rem; font-weight: 600; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card .c-rating {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 4px 7px;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      font-size: 0.65rem; display: flex; justify-content: space-between;
    }
    .rating-hi  { color: #4ade80; }
    .rating-mid { color: #fbbf24; }
    .rating-lo  { color: #ef4444; }

    /* ── RESULTS GRID ── */
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 14px; padding: 16px 20px;
    }
    .results-grid .card { flex: none; width: 100%; }

    /* ── PLAYER PAGE ── */
    #player { display: none; padding: 20px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 20px; border-radius: 40px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-size: 0.9rem; cursor: pointer;
      transition: all 0.2s; margin-bottom: 24px;
    }
    .back-btn:hover { border-color: var(--accent); background: rgba(255,255,255,0.08); }
    .player-layout {
      display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap;
    }
    .player-poster {
      width: 160px; flex-shrink: 0; border-radius: 10px;
      border: 2px solid var(--border); object-fit: cover;
    }
    .player-info { flex: 1; min-width: 240px; }
    .player-info h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
    .player-meta { display: flex; flex-wrap: wrap; gap: 10px; font-size: 0.85rem; color: var(--muted); margin-bottom: 14px; }
    .player-overview { font-size: 0.9rem; line-height: 1.7; color: var(--muted); max-width: 700px; }
    .play-btn {
      margin-top: 20px; padding: 13px 38px;
      border-radius: 40px; border: 2px solid var(--accent);
      background: rgba(0,255,200,0.1); color: var(--text);
      font-size: 1rem; font-weight: 700; cursor: pointer;
      letter-spacing: 0.5px; transition: all 0.2s;
    }
    .play-btn:hover { background: rgba(0,255,200,0.22); box-shadow: 0 0 20px rgba(0,255,200,0.3); }

    /* ── EPISODE SELECTOR ── */
    .episode-box {
      margin-top: 28px; border: 1px solid var(--border); border-radius: 14px;
      padding: 18px; max-width: 700px; max-height: 55vh; overflow-y: auto;
      background: rgba(0,0,0,0.3); backdrop-filter: blur(10px);
    }
    .episode-box h3 { color: var(--accent); margin-bottom: 14px; font-size: 1rem; }
    .season-select {
      width: 100%; padding: 8px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: rgba(255,255,255,0.06);
      color: var(--text); margin-bottom: 14px; cursor: pointer; font-size: 0.9rem;
    }
    .season-select option { background: #12162a; }
    .ep-item {
      padding: 10px 12px; border-radius: 8px; cursor: pointer;
      border: 1px solid transparent; margin-bottom: 6px;
      transition: all 0.18s; font-size: 0.88rem;
    }
    .ep-item:hover { background: rgba(0,255,200,0.12); border-color: var(--accent); }
    .ep-item.active { background: rgba(0,255,200,0.2); border-color: var(--accent); }
    .ep-num { font-weight: 700; color: var(--accent); font-size: 0.8rem; margin-bottom: 2px; }
    .ep-title { color: var(--muted); }

    /* ── CONTINUE WATCHING ── */
    .cw-wrap { position: relative; }
    .cw-remove {
      position: absolute; top: 5px; right: 5px; width: 22px; height: 22px;
      border-radius: 50%; background: rgba(229,9,20,0.85); border: none;
      color: #fff; font-size: 0.8rem; cursor: pointer; z-index: 10;
      display: none; align-items: center; justify-content: center;
    }
    .cw-wrap:hover .cw-remove { display: flex; }
    .progress-bar {
      position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
      background: rgba(255,255,255,0.2);
    }
    .progress-fill { height: 100%; background: var(--accent); }

    /* ── VIDEO PLAYER ── */
    #video-wrap {
      position: fixed; inset: 0; z-index: 9000;
      background: #000; display: none;
    }
    #video-wrap.active { display: block; }
    #native-video {
      width: 100%; height: 100%; object-fit: contain;
    }

    /* ── HLS CONTROLS ── */
    #hls-controls {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 9100;
      padding: 10px 20px 18px;
      background: linear-gradient(to top, rgba(0,0,0,0.97), transparent);
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    #hls-controls.visible { opacity: 1; pointer-events: all; }
    .ctrl-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 8px; display: flex; justify-content: space-between; }
    .ctrl-time { color: var(--muted); font-size: 0.85rem; }
    .ctrl-progress {
      width: 100%; height: 5px; background: rgba(255,255,255,0.2);
      border-radius: 5px; cursor: pointer; margin-bottom: 12px; position: relative;
    }
    .ctrl-progress-fill {
      height: 100%; background: var(--accent); border-radius: 5px;
      box-shadow: 0 0 8px rgba(0,255,200,0.6); width: 0%;
    }
    .ctrl-btns { display: flex; gap: 10px; }
    .ctrl-btn {
      padding: 7px 18px; border-radius: 40px;
      border: 1px solid rgba(0,255,200,0.35); background: rgba(255,255,255,0.08);
      color: var(--text); font-size: 0.88rem; cursor: pointer;
      transition: all 0.15s; display: flex; align-items: center; gap: 5px;
    }
    .ctrl-btn:hover, .ctrl-btn.focused {
      border-color: var(--accent); background: rgba(0,255,200,0.2);
      transform: scale(1.06);
    }

    /* ── OVERLAY SPINNER ── */
    #play-overlay {
      position: fixed; inset: 0; z-index: 9200;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.45); pointer-events: none;
    }
    #play-overlay.active { display: flex; }
    .spinner {
      width: 54px; height: 54px; border-radius: 50%;
      border: 3px solid rgba(0,255,200,0.2); border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── HINT ── */
    #hint {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(8,11,26,0.95); border: 1px solid var(--accent);
      padding: 10px 22px; border-radius: 40px; font-size: 0.85rem;
      z-index: 300; display: none; white-space: nowrap;
    }
    /* ── LOADING / EMPTY ── */
    .loading { padding: 40px; text-align: center; color: var(--muted); }
    .empty   { padding: 40px; text-align: center; color: var(--muted); font-size: 0.95rem; }
    @media (max-width: 600px) {
      .card { flex: 0 0 110px; height: 165px; }
      .results-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
      .player-poster { width: 120px; }
      .player-info h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<!-- STATUS BADGE -->
<div class="api-badge" id="api-badge">
  <div class="dot"></div>
  <span id="api-badge-text">Connessione...</span>
</div>

<!-- HEADER -->
<header class="header" id="main-header">
  <div class="logo">
    NeroZone
    <img src="https://alemagno1994alex-glitch.github.io/autoupdate/images/logo.png" alt="" onerror="this.style.display='none'">
  </div>
  <button class="search-btn" id="search-btn">🔍 Cerca titolo, genere, anno, regista…</button>
  <button class="clear-btn" id="clear-btn">✕ Cancella</button>
</header>

<!-- APP -->
<div id="app">

  <!-- HOME -->
  <div id="home">

    </div>

  <!-- SEARCH RESULTS -->

  <!-- PLAYER -->
  <div id="player">

        <div class="player-meta" id="pl-meta"></div>

    <div class="episode-box" id="ep-box" style="display:none">
      <h3>Seleziona episodio</h3>
      <div style="margin-bottom:10px">
        <label style="font-size:0.8rem;color:var(--muted);display:block;margin-bottom:4px">Stagione</label>
        <select class="season-select" id="season-select"></select>

</div>

<!-- VIDEO LAYER -->

</div>

<!-- CONTROLS -->
<div id="hls-controls">
  <div class="ctrl-title">
    <span id="ctrl-label"></span>
    <span class="ctrl-time" id="ctrl-time">0:00 / 0:00</span>
  </div>
  <div class="ctrl-progress" id="ctrl-progress">
    <div class="ctrl-progress-fill" id="ctrl-fill"></div>
  </div>
  <div class="ctrl-btns">
    <button class="ctrl-btn" id="btn-play">⏸ Pausa</button>
    <button class="ctrl-btn" id="btn-rew">⏪ -10s</button>
    <button class="ctrl-btn" id="btn-fwd">⏩ +10s</button>
    <button class="ctrl-btn" id="btn-mute">🔊 Audio</button>
    <button class="ctrl-btn" id="btn-close">✕ Chiudi</button>
  </div>
</div>

<!-- SPINNER -->
<div id="play-overlay"><div class="spinner"></div></div>

<!-- HINT -->
<div id="hint"></div>

<script>
/* ═══════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════ */
const TMDB_KEY  = "8265bd1679663a7ea12ac168da84d2e8";
const PROXY     = "/.netlify/functions/proxy?url=";
const VIXSRC    = "vixsrc.to";

const ENDPOINTS = {
  trending:      "trending/all/week",
  nowPlaying:    "movie/now_playing",
  popularMovies: "movie/popular",
  onTheAir:      "tv/on_the_air",
  popularTV:     "tv/popular"
};

const GENRE_MAP = {
  'azione':28,'avventura':12,'animazione':16,'commedia':35,'crimine':80,
  'documentario':99,'dramma':18,'drammatico':18,'famiglia':10751,'fantasy':14,
  'storia':36,'storico':36,'horror':27,'musica':10402,'musicale':10402,
  'mistero':9648,'romantico':10749,'romance':10749,'fantascienza':878,
  'sci-fi':878,'scifi':878,'thriller':53,'guerra':10752,'western':37
};

const HISTORY_KEY = 'nz_history';
const MAX_HIST    = 20;

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let available     = [];      // { tmdb_id }[]
let currentItem   = null;
let currentStream = null;
let hlsInstance   = null;
let ctrlInterval  = null;
let ctrlTimeout   = null;
let ctrlVisible   = false;
let focusedBtn    = -1;
let searchQuery   = "";
let searchPage    = 1;
let searchTotal   = 1;
let loadingMore   = false;
let searchData    = {};

/* ═══════════════════════════════════════════════
   PROXY FETCH
═══════════════════════════════════════════════ */
async function proxyFetch(url, timeout = 10000) {
  const res = await fetch(PROXY + encodeURIComponent(url), {
    signal: AbortSignal.timeout(timeout)
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res;
}

/* ═══════════════════════════════════════════════
   AVAILABLE CONTENT
═══════════════════════════════════════════════ */
async function loadAvailable() {
  const badge = document.getElementById('api-badge');
  const txt   = document.getElementById('api-badge-text');

  const tryList = async (url) => {
    try {
      const res  = await proxyFetch(url, 12000);
      const data = await res.json();
      if (Array.isArray(data) && data.length) return data;
    } catch(e) { console.warn('[NZ] lista fallita:', e.message); }
    return null;
  };

  const [movies, tv] = await Promise.all([
    tryList(`https://${VIXSRC}/api/list/movie/?lang=it`),
    tryList(`https://${VIXSRC}/api/list/tv/?lang=it`)
  ]);

  const m = movies ? movies.map(i => ({ tmdb_id: i.tmdb_id ?? i.id })) : [];
  const t = tv     ? tv.map(i => ({ tmdb_id: i.tmdb_id ?? i.id }))     : [];
  available = [...m, ...t];

  if (available.length) {
    badge.className = 'api-badge ok';
    txt.textContent = `✓ ${available.length} titoli`;
    setTimeout(() => badge.style.opacity = '0', 3000);
  } else {
    badge.className = 'api-badge error';
    txt.textContent = '⚠ Lista non disponibile';
  }
}

const isAvailable = id =>
  available.length === 0 || available.some(c => c.tmdb_id === id);

/* ═══════════════════════════════════════════════
   TMDB
═══════════════════════════════════════════════ */
async function tmdb(path, params = {}) {
  const qs = new URLSearchParams({ api_key: TMDB_KEY, language: 'it-IT', ...params });
  const res = await fetch(`https://api.themoviedb.org/3/${path}?${qs}`);
  return res.json();
}

async function loadRow(key, containerId) {
  const container = document.getElementById(containerId);
  const data = await tmdb(ENDPOINTS[key], { page: 1 });
  container.innerHTML = '';
  let idx = 0;
  for (const item of (data.results || [])) {
    if (!isAvailable(item.id)) continue;
    const card = buildCard(item, idx++);
    container.appendChild(card);
  }
  if (!container.children.length) container.innerHTML = '<div class="loading">Nessun contenuto</div>';
}

/* ═══════════════════════════════════════════════
   CARD
═══════════════════════════════════════════════ */
function poster(item) {
  return item.poster_path
    ? `https://image.tmdb.org/t/p/w342${item.poster_path}`
    : `https://via.placeholder.com/342x513/12162a/555?text=${encodeURIComponent(item.title||item.name||'?')}`;
}

function buildCard(item, idx) {
  const isMovie = !!(item.title || item.media_type === 'movie');
  const title   = item.title || item.name || '';
  const rating  = item.vote_average ? item.vote_average.toFixed(1) : 'N/D';
  const rClass  = item.vote_average >= 7 ? 'rating-hi' : item.vote_average >= 5 ? 'rating-mid' : 'rating-lo';

  const card = document.createElement('div');
  card.className = 'card';
  card.tabIndex = 0;
  card.dataset.index = idx;
  card.innerHTML = `
    <img src="${poster(item)}" alt="${title}" loading="lazy">
    <div class="c-title">${title}</div>
    <div class="c-rating">
      <span>${isMovie ? '🎬' : '📺'}</span>
      <span class="${rClass}">⭐ ${rating}</span>
    </div>`;

  card.addEventListener('click', () => openPlayer(item));
  card.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openPlayer(item); }
  });
  card.addEventListener('focus', () => setBackdrop(item));
  return card;
}

/* ═══════════════════════════════════════════════
   BACKDROP
═══════════════════════════════════════════════ */
function setBackdrop(item) {
  const url = item.backdrop_path
    ? `https://image.tmdb.org/t/p/w1280${item.backdrop_path}`
    : null;
  if (url) {
    document.body.style.backgroundImage = `url('${url}')`;
    document.body.classList.add('has-backdrop');
  } else {
    document.body.style.backgroundImage = 'none';
    document.body.classList.remove('has-backdrop');
  }
}

/* ═══════════════════════════════════════════════
   PLAYER OPEN
═══════════════════════════════════════════════ */
async function openPlayer(item) {
  currentItem = item;
  const isMovie = !!(item.title || item.media_type === 'movie');

  showPage('player');
  setBackdrop(item);

  const title   = item.title || item.name || '';
  const release = item.release_date || item.first_air_date || '';

  // fill basic info immediately
  document.getElementById('pl-title').textContent = title;
  document.getElementById('pl-meta').innerHTML =
    `<span>📅 ${release.slice(0,4) || 'N/D'}</span>
     <span>${isMovie ? '🎬 Film' : '📺 Serie TV'}</span>
     <span>⭐ ${item.vote_average ? item.vote_average.toFixed(1) : 'N/D'}</span>`;
  document.getElementById('pl-overview').textContent = item.overview || '';

  const posterEl = document.getElementById('pl-poster');
  if (item.poster_path) {
    posterEl.src = `https://image.tmdb.org/t/p/w342${item.poster_path}`;
    posterEl.style.display = 'block';
  } else {
    posterEl.style.display = 'none';
  }

  // fetch extra info (runtime)
  try {
    const det = await tmdb(isMovie ? `movie/${item.id}` : `tv/${item.id}`);
    let rt = '';
    if (isMovie && det.runtime) rt = `${Math.floor(det.runtime/60)}h ${det.runtime%60}m`;
    else if (!isMovie && det.episode_run_time?.length) rt = `~${det.episode_run_time[0]}m/ep`;
    if (rt) {
      const meta = document.getElementById('pl-meta');
      meta.innerHTML += `<span>⏱ ${rt}</span>`;
    }
  } catch {}

  if (isMovie) {
    document.getElementById('ep-box').style.display = 'none';
    document.getElementById('play-movie-btn').style.display = 'inline-flex';
    // pre-load stream
    showHint('Caricamento stream…');
    const stream = await getStream(item.id, true);
    hideHint();
    if (stream) {
      currentStream = stream;
      document.getElementById('play-movie-btn').onclick = () => playHLS(stream);
    } else {
      document.getElementById('play-movie-btn').textContent = '⚠ Stream non disponibile';
      document.getElementById('play-movie-btn').disabled = true;
    }
  } else {
    document.getElementById('play-movie-btn').style.display = 'none';
    document.getElementById('ep-box').style.display = 'block';
    await loadSeasons(item.id);
  }

  window.scrollTo(0, 0);
  document.getElementById('back-btn').focus();
}

/* ═══════════════════════════════════════════════
   STREAM (solo Netlify proxy)
═══════════════════════════════════════════════ */
async function getStream(id, isMovie, season = null, ep = null) {
  let url = `https://${VIXSRC}/${isMovie ? 'movie' : 'tv'}/${id}`;
  if (!isMovie && season !== null && ep !== null) url += `/${season}/${ep}`;

  try {
    const res  = await proxyFetch(url, 12000);
    const html = await res.text();

    const paramsMatch = html.match(/window\.masterPlaylist[^:]+params:[^{]+({[^<]+?})/);
    if (!paramsMatch) throw new Error('params non trovati');

    let paramsStr = paramsMatch[1]
      .replace(/'/g, '"').replace(/\s+/g,'')
      .replace(/\n/g,'').replace(/\\n/g,'').replace(',}', '}');
    const params = JSON.parse(paramsStr);

    const urlMatch = html.match(/window\.masterPlaylist\s*=\s*\{[\s\S]*?url:\s*'([^']+)'/);
    if (!urlMatch) throw new Error('URL non trovato');

    const fhdMatch = html.match(/window\.canPlayFHD\s*=\s*(\w+)/);
    const canFHD   = fhdMatch?.[1] === 'true';
    const base     = urlMatch[1];
    const sep      = /\?[^#]+/.test(base) ? '&' : '?';
    const m3u8     = base + sep + `expires=${params.expires}&token=${params.token}` + (canFHD ? '&h=1' : '');

    console.log('[NZ] Stream OK:', m3u8.substring(0, 80));
    return m3u8;
  } catch(e) {
    console.error('[NZ] Stream fallito:', e.message);
    return null;
  }
}

/* ═══════════════════════════════════════════════
   TV SEASONS / EPISODES
═══════════════════════════════════════════════ */
async function loadSeasons(tvId) {
  const data    = await tmdb(`tv/${tvId}`);
  const seasons = (data.seasons || []).filter(s => s.season_number > 0);
  const sel     = document.getElementById('season-select');
  sel.innerHTML = seasons.map(s =>
    `<option value="${s.season_number}">Stagione ${s.season_number}</option>`
  ).join('');
  sel.onchange = () => loadEpisodes(tvId, parseInt(sel.value));
  if (seasons.length) await loadEpisodes(tvId, seasons[0].season_number);
}

async function loadEpisodes(tvId, seasonNum) {
  const data     = await tmdb(`tv/${tvId}/season/${seasonNum}`);
  const episodes = data.episodes || [];
  const list     = document.getElementById('ep-list');
  list.innerHTML = '';

  episodes.forEach(ep => {
    const div = document.createElement('div');
    div.className = 'ep-item';
    div.tabIndex  = 0;
    div.innerHTML = `
      <div class="ep-num">Episodio ${ep.episode_number}</div>
      <div class="ep-title">${ep.name || 'Senza titolo'}</div>`;

    const select = async () => {
      list.querySelectorAll('.ep-item').forEach(e => e.classList.remove('active'));
      div.classList.add('active');
      showHint(`Caricamento E${ep.episode_number}…`);
      const stream = await getStream(tvId, false, seasonNum, ep.episode_number);
      hideHint();
      if (stream) {
        const prog = getProgress(currentItem.id, false, seasonNum, ep.episode_number);
        await playHLS(stream, prog?.t || 0, seasonNum, ep.episode_number);
      } else {
        showHint('⚠ Stream non disponibile', 3000);
      }
    };

    div.addEventListener('click', select);
    div.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); select(); } });
    list.appendChild(div);
  });
}

/* ═══════════════════════════════════════════════
   HLS PLAYBACK
═══════════════════════════════════════════════ */
async function playHLS(rawUrl, startTime = 0, season = null, ep = null) {
  // URL passa attraverso il proxy Netlify per bypassare CORS/403
  const proxied = PROXY + encodeURIComponent(rawUrl);

  stopHLS();
  document.getElementById('video-wrap').classList.add('active');
  document.getElementById('main-header').style.display = 'none';
  showSpinner();

  const video = document.getElementById('native-video');
  video.src = '';

  const isMovie = !!(currentItem?.title || currentItem?.media_type === 'movie');
  updateCtrlLabel(season, ep);

  if (Hls.isSupported()) {
    const hls = new Hls({
      maxBufferLength: 60,
      startLevel: -1,
      xhrSetup(xhr) { xhr.withCredentials = false; }
    });
    hlsInstance = hls;
    hls.loadSource(proxied);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      if (startTime > 0) video.currentTime = startTime;
      video.play().catch(() => {});
      hideSpinner();
      showControls();
    });
    hls.on(Hls.Events.ERROR, (_, d) => {
      if (!d.fatal) return;
      if (d.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
      else if (d.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
      else { hideSpinner(); showHint('⚠ Errore riproduzione', 3000); }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = proxied;
    video.addEventListener('loadedmetadata', () => {
      if (startTime > 0) video.currentTime = startTime;
      video.play().catch(() => {});
      hideSpinner(); showControls();
    }, { once: true });
  } else {
    hideSpinner();
    showHint('⚠ HLS non supportato su questo browser', 4000);
    return;
  }

  video.addEventListener('waiting',  showSpinner);
  video.addEventListener('playing',  hideSpinner);
  video.addEventListener('pause',    showSpinner);
  video.addEventListener('playing',  () => updatePlayBtn(false));
  video.addEventListener('pause',    () => updatePlayBtn(true));

  // save progress every 15s
  const saveInt = setInterval(() => {
    if (!video.paused && video.duration > 0)
      saveProgress(currentItem, video.currentTime, video.duration, isMovie, season, ep);
  }, 15000);
  video.addEventListener('pause', () => {
    if (video.duration > 0)
      saveProgress(currentItem, video.currentTime, video.duration, isMovie, season, ep);
  });

  // controls auto-hide
  startCtrlInterval();

  // cleanup stored on close
  document.getElementById('btn-close')._cleanup = () => clearInterval(saveInt);

  // keyboard
  document.addEventListener('keydown', playerKeyHandler);
}

function stopHLS() {
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  const video = document.getElementById('native-video');
  video.pause(); video.src = '';
  video.removeEventListener('waiting',  showSpinner);
  video.removeEventListener('playing',  hideSpinner);
  video.removeEventListener('pause',    showSpinner);
  video.removeEventListener('playing',  () => updatePlayBtn(false));
  video.removeEventListener('pause',    () => updatePlayBtn(true));
  clearInterval(ctrlInterval); clearTimeout(ctrlTimeout);
  document.removeEventListener('keydown', playerKeyHandler);
}

function closePlayer() {
  const cleanup = document.getElementById('btn-close')._cleanup;
  if (cleanup) cleanup();
  stopHLS();
  document.getElementById('video-wrap').classList.remove('active');
  document.getElementById('main-header').style.display = 'flex';
  hideControls(); hideSpinner();
  loadContinueWatching();
}

/* ═══════════════════════════════════════════════
   CONTROLS UI
═══════════════════════════════════════════════ */
function showControls() {
  const ctrl = document.getElementById('hls-controls');
  ctrl.classList.add('visible'); ctrlVisible = true;
  clearTimeout(ctrlTimeout);
  ctrlTimeout = setTimeout(hideControls, 4000);
}
function hideControls() {
  document.getElementById('hls-controls').classList.remove('visible');
  ctrlVisible = false; focusedBtn = -1;
}

function startCtrlInterval() {
  clearInterval(ctrlInterval);
  ctrlInterval = setInterval(() => {
    const video = document.getElementById('native-video');
    if (!video.duration) return;
    const pct = (video.currentTime / video.duration) * 100;
    document.getElementById('ctrl-fill').style.width = pct + '%';
    const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
    document.getElementById('ctrl-time').textContent =
      `${fmt(video.currentTime)} / ${fmt(video.duration)}`;
  }, 500);
}

function updatePlayBtn(paused) {
  const btn = document.getElementById('btn-play');
  btn.textContent = paused ? '▶ Play' : '⏸ Pausa';
}
function updateCtrlLabel(season, ep) {
  const title = currentItem?.title || currentItem?.name || '';
  const sub   = (season && ep) ? ` • S${season}:E${ep}` : '';
  document.getElementById('ctrl-label').textContent = title + sub;
}

const BTNS = ['btn-play','btn-rew','btn-fwd','btn-mute','btn-close'];
function focusCtrlBtn(idx) {
  BTNS.forEach((id, i) => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('focused', i === idx);
  });
  focusedBtn = idx;
}

function playerKeyHandler(e) {
  const k = e.key;
  const BACK = ['Escape','BrowserBack','GoBack','Back'];
  const ENTER = ['Enter',' '];

  if ([...BACK,'ArrowUp','ArrowDown','ArrowLeft','ArrowRight',...ENTER].includes(k))
    e.preventDefault();

  if (k === 'ArrowUp') { showControls(); if (focusedBtn < 0) focusCtrlBtn(0); return; }
  if (k === 'ArrowDown') { if (focusedBtn >= 0) { focusCtrlBtn(-1); } else showControls(); return; }

  const video = document.getElementById('native-video');

  if (k === 'ArrowLeft') {
    if (ctrlVisible && focusedBtn > 0) { focusCtrlBtn(focusedBtn - 1); showControls(); }
    else video.currentTime = Math.max(0, video.currentTime - 10);
    return;
  }
  if (k === 'ArrowRight') {
    if (ctrlVisible && focusedBtn >= 0 && focusedBtn < BTNS.length - 1) { focusCtrlBtn(focusedBtn + 1); showControls(); }
    else video.currentTime = Math.min(video.duration || 0, video.currentTime + 10);
    return;
  }
  if (ENTER.includes(k)) {
    if (ctrlVisible && focusedBtn >= 0) document.getElementById(BTNS[focusedBtn])?.click();
    else { video.paused ? video.play() : video.pause(); showControls(); }
    return;
  }
  if (BACK.includes(k) || [10009,461,8].includes(e.keyCode)) {
    if (focusedBtn >= 0) { focusCtrlBtn(-1); return; }
    closePlayer();
  }
}

// ctrl-progress click
document.getElementById('ctrl-progress').addEventListener('click', e => {
  const video = document.getElementById('native-video');
  if (!video.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  video.currentTime = ((e.clientX - r.left) / r.width) * video.duration;
});

// ctrl buttons
document.getElementById('btn-play').addEventListener('click', () => {
  const v = document.getElementById('native-video');
  v.paused ? v.play() : v.pause(); showControls();
});
document.getElementById('btn-rew').addEventListener('click', () => {
  const v = document.getElementById('native-video');
  v.currentTime = Math.max(0, v.currentTime - 10); showControls();
});
document.getElementById('btn-fwd').addEventListener('click', () => {
  const v = document.getElementById('native-video');
  v.currentTime = Math.min(v.duration || 0, v.currentTime + 10); showControls();
});
document.getElementById('btn-mute').addEventListener('click', () => {
  const v = document.getElementById('native-video');
  v.muted = !v.muted;
  document.getElementById('btn-mute').textContent = v.muted ? '🔇 Muto' : '🔊 Audio';
  showControls();
});
document.getElementById('btn-close').addEventListener('click', closePlayer);

// show controls on mouse move
document.getElementById('video-wrap').addEventListener('mousemove', showControls);

/* ═══════════════════════════════════════════════
   PROGRESS SAVE
═══════════════════════════════════════════════ */
function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
}
function saveProgress(item, t, dur, isMovie, season, ep) {
  if (!item || t < 10) return;
  const pct = (t / dur) * 100;
  if (pct > 92) { removeProgress(item.id, isMovie, season, ep); return; }
  try {
    let h = getHistory().filter(x =>
      isMovie ? !(x.id === item.id && x.m) : !(x.id === item.id && !x.m && x.s === season && x.e === ep)
    );
    h.unshift({ id: item.id, title: item.title || item.name, poster: item.poster_path,
      m: isMovie, s: season, e: ep, t, dur, item, ts: Date.now() });
    if (h.length > MAX_HIST) h = h.slice(0, MAX_HIST);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  } catch {}
}
function getProgress(id, isMovie, season, ep) {
  return getHistory().find(x =>
    isMovie ? x.id === id && x.m : x.id === id && !x.m && x.s === season && x.e === ep
  ) || null;
}
function removeProgress(id, isMovie, season, ep) {
  try {
    const h = getHistory().filter(x =>
      isMovie ? !(x.id === id && x.m) : !(x.id === id && !x.m && x.s === season && x.e === ep)
    );
    localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  } catch {}
}

/* ═══════════════════════════════════════════════
   CONTINUE WATCHING
═══════════════════════════════════════════════ */
function loadContinueWatching() {
  const history = getHistory();
  const section = document.getElementById('cw-section');
  const row     = document.getElementById('cw-row');
  row.innerHTML = '';
  if (!history.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';

  history.forEach(h => {
    const wrap = document.createElement('div');
    wrap.className = 'cw-wrap';
    wrap.style.cssText = 'flex:0 0 130px;position:relative;';

    const pct  = Math.min(100, Math.round((h.t / h.dur) * 100));
    const card = document.createElement('div');
    card.className = 'card';
    card.style.flex = 'none';
    card.tabIndex = 0;
    card.innerHTML = `
      <img src="https://image.tmdb.org/t/p/w342${h.poster || ''}" alt="${h.title}" loading="lazy"
           onerror="this.src='https://via.placeholder.com/342x513/12162a/555?text=?'">
      <div class="c-title">${h.title}</div>
      <div class="c-rating">
        <span style="color:var(--accent);font-size:0.65rem">${h.m ? '🎬' : `S${h.s}E${h.e}`}</span>
        <span style="color:var(--muted);font-size:0.65rem">${pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;

    card.addEventListener('click', () => {
      if (!h.m && h.s && h.e) openPlayerWithEp(h.item, h.s, h.e);
      else openPlayer(h.item);
    });
    card.addEventListener('focus', () => setBackdrop(h.item || h));

    const rmBtn = document.createElement('button');
    rmBtn.className = 'cw-remove';
    rmBtn.textContent = '✕';
    rmBtn.title = 'Rimuovi';
    rmBtn.addEventListener('click', e => {
      e.stopPropagation();
      removeProgress(h.id, h.m, h.s, h.e);
      loadContinueWatching();
    });

    wrap.appendChild(card);
    wrap.appendChild(rmBtn);
    row.appendChild(wrap);
  });
}

async function openPlayerWithEp(item, season, ep) {
  currentItem = item;
  showPage('player');
  setBackdrop(item);

  document.getElementById('pl-title').textContent = (item.title || item.name) + ` — S${season}E${ep}`;
  document.getElementById('pl-meta').textContent = '';
  document.getElementById('pl-overview').textContent = item.overview || '';
  document.getElementById('play-movie-btn').style.display = 'none';
  document.getElementById('ep-box').style.display = 'block';

  const posterEl = document.getElementById('pl-poster');
  if (item.poster_path) {
    posterEl.src = `https://image.tmdb.org/t/p/w342${item.poster_path}`;
    posterEl.style.display = 'block';
  } else posterEl.style.display = 'none';

  await loadSeasons(item.id);
  document.getElementById('season-select').value = season;
  await loadEpisodes(item.id, season);

  showHint(`Caricamento S${season}E${ep}…`);
  const stream = await getStream(item.id, false, season, ep);
  hideHint();
  if (stream) {
    const prog = getProgress(item.id, false, season, ep);
    await playHLS(stream, prog?.t || 0, season, ep);
  }
  window.scrollTo(0, 0);
}

function openSearch() {
  const q = prompt('🔍 Cerca titolo, genere, anno…', searchQuery);
  if (q === null) return;
  searchQuery = q.trim();
  if (!searchQuery) { clearSearch(); return; }
  document.getElementById('search-btn').textContent = `🔍 "${searchQuery}"`;
  document.getElementById('clear-btn').style.display = 'inline-block';
  runSearch(searchQuery);

function clearSearch() {

  document.getElementById('clear-btn').style.display = 'none';
  showPage('home');

  document.body.classList.remove('has-backdrop');
}

async function runSearch(q, page = 1, append = false) {
  const container = document.getElementById('results');
  if (!append) {
    container.innerHTML = '<div class="loading">Ricerca in corso…</div>';
    showPage('results');
    searchPage = 1; searchTotal = 1; searchData = { q };
  }

  const qLower  = q.toLowerCase().trim();
  const genreId = GENRE_MAP[qLower];
  const year    = parseInt(q);
  let items     = [];

  try {
    if (genreId) {
      const [dm, dt] = await Promise.all([
        tmdb('discover/movie', { with_genres: genreId, sort_by: 'popularity.desc', page }),
        tmdb('discover/tv',    { with_genres: genreId, sort_by: 'popularity.desc', page })
      ]);
      items.push(...(dm.results||[]).map(i=>({...i,media_type:'movie'})));
      items.push(...(dt.results||[]).map(i=>({...i,media_type:'tv'})));
      searchTotal = Math.max(dm.total_pages||1, dt.total_pages||1);
    } else if (!isNaN(year) && year >= 1900 && year <= 2035) {
      const [dm, dt] = await Promise.all([
        tmdb('discover/movie', { primary_release_year: year, sort_by: 'popularity.desc', page }),
        tmdb('discover/tv',    { first_air_date_year:  year, sort_by: 'popularity.desc', page })
      ]);
      items.push(...(dm.results||[]).map(i=>({...i,media_type:'movie'})));
      items.push(...(dt.results||[]).map(i=>({...i,media_type:'tv'})));
      searchTotal = Math.max(dm.total_pages||1, dt.total_pages||1);
    } else {
      const d = await tmdb('search/multi', { query: q, page });
      items = (d.results||[]).filter(i => i.media_type !== 'person');
      searchTotal = d.total_pages || 1;
    }
  } catch(e) { console.error('[NZ] search error:', e); }

  const filtered = [...new Map(items.map(i=>[i.id,i])).values()]
    .filter(i => isAvailable(i.id))
    .sort((a,b) => (b.popularity||0)-(a.popularity||0));

  if (!append) container.innerHTML = '';
  let grid = container.querySelector('.results-grid');
  if (!grid) {
    container.innerHTML = `<div class="section-title" style="padding:20px 20px 6px">Risultati per "${q}"</div>`;
    grid = document.createElement('div');
    grid.className = 'results-grid';
    container.appendChild(grid);
  }

  let idx = grid.children.length;
  filtered.forEach(item => {
    const card = buildCard(item, idx++);
    grid.appendChild(card);
  });

  if (!grid.children.length)
    grid.innerHTML = '<div class="empty">Nessun risultato disponibile</div>';

  loadingMore = false;
}

window.addEventListener('scroll', () => {
  if (document.getElementById('results').style.display !== 'block') return;
  if (loadingMore || searchPage >= searchTotal) return;
  if (window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 400) {
    loadingMore = true;
    searchPage++;
    runSearch(searchData.q, searchPage, true);
  }
});

    ['trending',      'row-trending'],
    ['nowPlaying',    'row-nowPlaying'],
    ['popularMovies', 'row-popularMovies'],
    ['onTheAir',      'row-onTheAir'],
    ['popularTV',     'row-popularTV'],
  ];
  for (const [key, id] of rows) await loadRow(key, id);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('[SW] OK'))
    .catch(() => {});
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
